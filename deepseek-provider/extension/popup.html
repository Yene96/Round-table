<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      width: 300px; 
      padding: 20px; 
      font-family: Arial, sans-serif;
      text-align: center;
    }
    h2 { color: #4CAF50; margin: 0 0 15px 0; }
    p { color: #666; font-size: 14px; }
    .status { 
      margin-top: 15px; 
      padding: 10px; 
      background: #f0f0f0; 
      border-radius: 5px;
      font-size: 12px;
    }
    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff4444;
      margin-right: 5px;
    }
    .connected .dot { background: #4CAF50; }
  </style>
</head>
<body>
  <h2>🤖 DeepSeek Provider</h2>
  <p>Lightweight browser automation agent</p>
  
  <div class="status" id="status">
    <span class="dot"></span>
    <span id="statusText">Connecting...</span>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
